<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cambiar tamaño de imágenes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="op-mode">
    <main class="app-shell">
        <section class="panel">
            <div class="panel-header">
                <h2>Capacidad Máxima: 200 imágenes</h2>
                <p>Organiza tus imágenes y descarga un PDF listo para imprimir.</p>
            </div>

            <label class="file-field">
                <span>Seleccionar imágenes</span>
                <input type="file" id="imageInput" multiple accept="image/*">
            </label>

            <div class="form-grid">
                <label class="field">
                    <span>Ancho imagen (cm)</span>
                    <input type="number" id="widthInput" value="6" step="0.1" onchange="updatePreview()">
                </label>
                <label class="field">
                    <span>Alto imagen (cm)</span>
                    <input type="number" id="heightInput" value="4" step="0.1" onchange="updatePreview()">
                </label>
                <label class="field">
                    <span>Espacio horizontal (cm)</span>
                    <input type="number" id="spaceWidthInput" value="0.5" step="0.1" onchange="updatePreview()">
                </label>
                <label class="field">
                    <span>Espacio vertical (cm)</span>
                    <input type="number" id="spaceHeightInput" value="0.5" step="0.1" onchange="updatePreview()">
                </label>
            </div>

            <label class="field">
                <span>Tamaño de página</span>
                <select id="pageSize" onchange="updatePreview()">
                    <option value="a4">A4 (21 × 29.7 cm)</option>
                    <option value="letter">Letter (21.59 × 27.94 cm)</option>
                    <option value="a3">A3 (29.7 × 42 cm)</option>
                    <option value="a5">A5 (14.8 × 21 cm)</option>
                    <option value="legal">Legal (21.59 × 35.56 cm)</option>
                    <option value="tabloid">Tabloid (27.94 × 43.18 cm)</option>
                </select>
            </label>

            <button class="primary-button" onclick="generarPDF()">Generar PDF</button>

            <div class="preview-section">
                <h3>Vista previa</h3>
                <div class="preview-container" id="previewContainer"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
